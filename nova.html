<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramiya — NJ Transit AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚂</text></svg>">
<meta name="description" content="Ramiya — NJ Transit AI assistant for train delay alerts.">
<style>
:root {
  --bg: #0A0A0F;
  --surface: #12121A;
  --surface2: #1A1A26;
  --border: #2A2A3E;
  --accent: #E63946;
  --accent2: #4CC9F0;
  --gold: #F4A261;
  --text: #E8E8F0;
  --text-dim: #9898B8;
  --nova-bubble: #1A1A26;
  --user-bubble: #2C4A7C;
  --success: #06D6A0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh; /* fallback for older browsers */
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(230,57,70,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(230,57,70,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0.875rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.nova-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.nova-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--accent), #FF6B6B);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 0 20px rgba(230,57,70,0.4);
}

.nova-name {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.2rem;
  letter-spacing: -0.02em;
  color: white;
}

.nova-sub {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-weight: 300;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.3rem 0.75rem;
  background: rgba(6,214,160,0.1);
  border: 1px solid rgba(6,214,160,0.2);
  border-radius: 50px;
  font-size: 0.7rem;
  color: var(--success);
  letter-spacing: 0.05em;
}

.status-dot {
  width: 6px;
  height: 6px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s infinite;
  box-shadow: 0 0 6px var(--success);
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.weather-badge {
  font-size: 0.75rem;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

/* Chat */
.chat-container {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 1.5rem 1rem 5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  max-width: 760px;
  width: 100%;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  height: 0;
  min-height: 0;
}

.chat-container::-webkit-scrollbar { width: 4px; }
.chat-container::-webkit-scrollbar-track { background: transparent; }
.chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Messages */
.message {
  display: flex;
  gap: 0.75rem;
  animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes msgIn {
  from { opacity:0; transform:translateY(16px) scale(0.96); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

.message.user { flex-direction: row-reverse; }

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
  margin-top: 2px;
}

.avatar.nova {
  background: transparent;
  box-shadow: 0 0 12px rgba(230,57,70,0.3);
  overflow: hidden;
}
.avatar.nova img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
  display: block;
}

.avatar.user {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
}

.bubble {
  max-width: 78%;
  padding: 0.875rem 1.125rem;
  border-radius: 16px;
  font-size: 0.875rem;
  line-height: 1.7;
  font-family: 'JetBrains Mono', monospace;
}

.message.nova .bubble {
  background: var(--nova-bubble);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

.message.user .bubble {
  background: var(--user-bubble);
  color: white;
  border-bottom-right-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
}

/* Chips */
.chips-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-left: 2.75rem;
  animation: msgIn 0.3s ease;
}

.chip {
  padding: 0.45rem 0.875rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text-dim);
  font-size: 0.78rem;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
  max-width: 100%;
  word-break: break-word;
}

.chip:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(230,57,70,0.08);
  transform: translateY(-1px);
}

/* Typing */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  animation: msgIn 0.3s ease;
}

.typing-dots {
  display: flex;
  gap: 5px;
  padding: 0.875rem 1.125rem;
  background: var(--nova-bubble);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
}

.typing-dots span {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: typingBounce 1.2s infinite;
  opacity: 0.6;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%,60%,100% { transform:translateY(0); opacity:0.6; }
  30% { transform:translateY(-6px); opacity:1; }
}

/* Train cards */
.train-cards {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  margin-left: 2.75rem;
}

.train-card {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.75rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace;
}

.train-card:hover {
  border-color: var(--accent2);
  background: rgba(76,201,240,0.05);
  transform: translateX(4px);
}

.train-card.selected {
  border-color: var(--accent);
  background: rgba(230,57,70,0.08);
}

.train-card.disabled { pointer-events:none; opacity:0.4; }

.train-num {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  color: var(--accent2);
  font-size: 0.9rem;
  min-width: 70px;
}

.train-time {
  font-size: 0.85rem;
  color: var(--text);
  font-weight: 500;
}

.train-dest {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-left: auto;
}

/* Summary */
.summary-card {
  margin-top: 0.5rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.summary-header {
  padding: 0.75rem 1rem;
  background: rgba(230,57,70,0.1);
  border-bottom: 1px solid var(--border);
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--accent);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.6rem 1rem;
  border-bottom: 1px solid rgba(42,42,62,0.5);
  font-size: 0.8rem;
}

.summary-row:last-child { border-bottom: none; }
.summary-label { color: var(--text-dim); }
.summary-value { color: var(--text); font-weight: 500; }

/* Stats card */
.stats-card {
  margin-top: 0.5rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
}

.stat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.875rem;
  text-align: center;
}

.stat-num {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.5rem;
  color: var(--accent2);
}

.stat-label {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 0.25rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Input */
.input-area {
  position: sticky;
  bottom: 0;
  z-index: 100;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 1rem;
}

.input-inner {
  max-width: 760px;
  margin: 0 auto;
  display: flex;
  gap: 0.75rem;
  align-items: center;
}

.input-inner input {
  flex: 1;
  padding: 0.875rem 1.25rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 0.875rem;
  font-family: 'JetBrains Mono', monospace;
  outline: none;
  transition: all 0.2s;
}

.input-inner input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(230,57,70,0.1);
}

.input-inner input::placeholder { color: var(--text-dim); }

.send-btn {
  width: 44px;
  height: 44px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
  box-shadow: 0 0 16px rgba(230,57,70,0.3);
}

.send-btn:hover { background: #FF4757; transform: scale(1.05); }
.send-btn:disabled { background: var(--border); box-shadow: none; cursor: not-allowed; transform: none; }

/* Mode badge */
.mode-badge {
  font-size: 0.65rem;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  background: rgba(244,162,97,0.15);
  border: 1px solid rgba(244,162,97,0.3);
  color: var(--gold);
  letter-spacing: 0.05em;
}

/* Test mode banner */
.test-banner {
  background: rgba(244,162,97,0.08);
  border-bottom: 1px solid rgba(244,162,97,0.2);
  padding: 0.4rem 1.5rem;
  font-size: 0.7rem;
  color: var(--gold);
  text-align: center;
  letter-spacing: 0.05em;
  font-family: 'JetBrains Mono', monospace;
}

a { color: var(--accent2); text-decoration: none; }
a:hover { text-decoration: underline; }

.form-link {
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  white-space: nowrap;
  padding: 0.25rem 0.5rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  transition: all 0.2s;
}
.form-link:hover { color: var(--text); border-color: var(--text-dim); text-decoration: none; }

@media (max-width: 375px) { .form-link { display: none; } }

/* Consent card */
.consent-card {
  background: #0F1A0F;
  border: 1px solid #1A3A1A;
  border-radius: 12px;
  padding: 1rem 1.25rem;
  margin-left: 2.75rem;
  font-size: 0.78rem;
  line-height: 1.6;
  color: #9090A8;
  animation: msgIn 0.3s ease;
}

.consent-card strong { color: #06D6A0; }

.consent-checkbox-row {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  margin-top: 0.75rem;
  padding-top: 0.75rem;
  border-top: 1px solid #1A3A1A;
}

.consent-checkbox-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  margin-top: 2px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}

.consent-checkbox-row label {
  color: #C8C8DC;
  font-size: 0.8rem;
  cursor: pointer;
  line-height: 1.5;
}

.consent-submit-btn {
  margin-top: 0.75rem;
  padding: 0.5rem 1.25rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: block;
  width: 100%;
}

.consent-submit-btn:hover { background: #FF4757; }
.consent-submit-btn:disabled { background: var(--border); cursor: not-allowed; }
a:hover { text-decoration: underline; }

/* ── MOBILE OPTIMIZATION ─────────────────────────────── */
@media (max-width: 640px) {

  /* Header — tighter on mobile */
  .header {
    padding: 0.625rem 1rem;
    gap: 0.625rem;
  }

  .nova-icon {
    width: 32px;
    height: 32px;
    font-size: 0.9rem;
    border-radius: 8px;
  }

  .nova-name { font-size: 1rem; }
  .nova-sub { display: none; } /* hide subtitle on small screens */

  .status-pill { padding: 0.25rem 0.6rem; font-size: 0.65rem; }
  .weather-badge { font-size: 0.7rem; }
  .mode-badge { display: none; }

  /* Test banner */
  .test-banner { font-size: 0.65rem; padding: 0.3rem 1rem; }

  /* Chat container — more breathing room at bottom for input */
  .chat-container {
    padding: 1rem 0.75rem 6rem;
    gap: 0.75rem;
  }

  /* Bubbles — wider on mobile */
  .bubble {
    max-width: 88%;
    font-size: 0.85rem;
    padding: 0.75rem 1rem;
    border-radius: 14px;
  }

  /* Avatar — smaller */
  .avatar {
    width: 28px;
    height: 28px;
    font-size: 0.75rem;
    border-radius: 8px;
  }

  .message { gap: 0.5rem; }

  /* Chips — full width friendly */
  .chips-row {
    margin-left: 2.25rem;
    gap: 0.4rem;
  }

  .chip {
    padding: 0.5rem 0.75rem;
    font-size: 0.75rem;
    border-radius: 8px;
  }

  /* Train cards — full width */
  .train-cards { margin-left: 2.25rem; }

  .train-card {
    padding: 0.625rem 0.875rem;
    gap: 0.75rem;
  }

  .train-num { font-size: 0.8rem; min-width: 60px; }
  .train-time { font-size: 0.8rem; }
  .train-dest { font-size: 0.7rem; }

  /* Summary card */
  .summary-card { margin-top: 0.25rem; }
  .summary-header { font-size: 0.75rem; padding: 0.625rem 0.875rem; }
  .summary-row { padding: 0.5rem 0.875rem; font-size: 0.75rem; }

  /* Stats card */
  .stats-card { margin-left: 2.25rem; }
  .stat-num { font-size: 1.25rem; }
  .stat-label { font-size: 0.65rem; }

  /* Consent card */
  .consent-card { margin-left: 2.25rem; font-size: 0.75rem; }
  .consent-checkbox-row label { font-size: 0.75rem; }

  /* Typing indicator */
  .typing-indicator { gap: 0.5rem; }
  .typing-dots { padding: 0.75rem 1rem; }

  /* Input area — larger touch targets */
  .input-area { padding: 0.75rem; }

  .input-inner input {
    padding: 0.75rem 1rem;
    font-size: 0.875rem;
    border-radius: 10px;
  }

  .send-btn {
    width: 44px;
    height: 44px;
    font-size: 1rem;
    border-radius: 10px;
    flex-shrink: 0;
  }
}

/* Extra small phones (iPhone SE etc) */
@media (max-width: 375px) {
  .bubble { max-width: 92%; font-size: 0.82rem; }
  .nova-name { font-size: 0.9rem; }
  .chip { font-size: 0.72rem; padding: 0.45rem 0.65rem; }
}

/* Prevent iOS zoom on input focus */
@media (max-width: 640px) {
  input, select, textarea {
    font-size: 16px !important;
  }
}
</style>
</head>
<body>


<div class="header">
  <div class="nova-logo">
    <div class="nova-icon" style="overflow:hidden;background:transparent;box-shadow:0 0 20px rgba(230,57,70,0.4);">
      <img src="Ramiya_avatar.jpg" alt="Ramiya" style="width:100%;height:100%;object-fit:cover;border-radius:10px;display:block;">
    </div>
    <div>
      <div class="nova-name">RAMIYA</div>
      <div class="nova-sub">NJ Transit AI Assistant</div>
    </div>
  </div>
  <div class="header-right">
    <div class="weather-badge" id="weatherBadge">📍 Loading...</div>
    <div class="status-pill">
      <div class="status-dot"></div>
      ONLINE
    </div>
    <div class="mode-badge">AI</div>
    <a href="index.html" class="form-link" title="Use the traditional form instead">Use form ↗</a>
  </div>
</div>

<div class="chat-container" id="chat"></div>

<div class="input-area">
  <div class="input-inner">
    <input type="text" id="userInput" placeholder="Ask Ramiya anything..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn" onclick="sendMessage()" id="sendBtn" aria-label="Send message">➤</button>
  </div>
</div>

<script>
const API_BASE = 'https://train-alerts-api.livelyhill-7b9b1325.westus2.azurecontainerapps.io';

const LINES = [
  {code:'NE',name:'Northeast Corridor'},{code:'NC',name:'North Jersey Coast'},
  {code:'RV',name:'Raritan Valley'},{code:'ME',name:'Morris & Essex'},
  {code:'MC',name:'Montclair-Boonton'},{code:'ML',name:'Main Line'},
  {code:'BC',name:'Bergen County'},{code:'PV',name:'Pascack Valley'},
  {code:'AC',name:'Atlantic City'},{code:'GS',name:'Gladstone Branch'}
];

const STATIONS = {
  NE:[{code:'TR',name:'Trenton'},{code:'HL',name:'Hamilton'},{code:'PJ',name:'Princeton Junction'},{code:'NB',name:'New Brunswick'},{code:'ED',name:'Edison'},{code:'MU',name:'Metuchen'},{code:'MP',name:'Metropark'},{code:'RH',name:'Rahway'},{code:'LI',name:'Linden'},{code:'EZ',name:'Elizabeth'},{code:'NP',name:'Newark Penn'}],
  NC:[{code:'BH',name:'Bay Head'},{code:'PP',name:'Point Pleasant Beach'},{code:'LB',name:'Long Branch'},{code:'RB',name:'Red Bank'},{code:'AM',name:'Aberdeen-Matawan'},{code:'RH',name:'Rahway'},{code:'NP',name:'Newark Penn'}],
  RV:[{code:'RA',name:'Raritan'},{code:'SM',name:'Somerville'},{code:'BW',name:'Bridgewater'},{code:'PF',name:'Plainfield'},{code:'WF',name:'Westfield'},{code:'XC',name:'Cranford'},{code:'NP',name:'Newark Penn'}],
  ME:[{code:'GL',name:'Gladstone'},{code:'ST',name:'Summit'},{code:'MB',name:'Millburn'},{code:'MW',name:'Maplewood'},{code:'SO',name:'South Orange'},{code:'ND',name:'Newark Broad St'}],
  MC:[{code:'HQ',name:'Hackettstown'},{code:'DO',name:'Dover'},{code:'BN',name:'Boonton'},{code:'UV',name:'Montclair State Univ'},{code:'UM',name:'Upper Montclair'}],
  ML:[{code:'SF',name:'Suffern'},{code:'RM',name:'Ramsey'},{code:'WK',name:'Waldwick'},{code:'HD',name:'Hillsdale'},{code:'WW',name:'Westwood'}],
  BC:[{code:'SF',name:'Suffern'},{code:'RW',name:'Ridgewood'},{code:'GK',name:'Glen Rock'},{code:'HB',name:'Hoboken'}],
  PV:[{code:'SV',name:'Spring Valley'},{code:'NN',name:'Nanuet'},{code:'PQ',name:'Pearl River'},{code:'HD',name:'Hillsdale'},{code:'WW',name:'Westwood'}],
  AC:[{code:'AC',name:'Atlantic City'},{code:'HN',name:'Hammonton'},{code:'LW',name:'Lindenwold'},{code:'PH',name:'Philadelphia'}],
  GS:[{code:'GL',name:'Gladstone'},{code:'FH',name:'Far Hills'},{code:'ST',name:'Summit'}]
};

// State
let state = {
  step: 'welcome',
  line: null, lineName: null,
  station: null, stationName: null,
  morningTrain: null, eveningTrain: null,   // first selected (backward compat)
  morningTrains: [], eveningTrains: [],      // ordered list, up to 3
  phone: null, ntfy_topic: null, schedule: 'weekday', allInbound: [],
  unsubPhone: null,
  pendingSubscribeBody: null,
  weather: null,
  timeOfDay: null
};

// Conversation history for Claude Haiku
let history = [];

const chat = document.getElementById('chat');

// ── Helpers ──────────────────────────────────────────────
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

function getTimeOfDay(){
  const h = new Date().getHours();
  if(h>=5&&h<12) return 'morning';
  if(h>=12&&h<17) return 'afternoon';
  if(h>=17&&h<21) return 'evening';
  return 'night';
}

function addMessage(role, html, extra=null){
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  if (role === 'nova') {
    const img = document.createElement('img');
    img.src = 'Ramiya_avatar.jpg';
    img.alt = 'Ramiya';
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:8px;display:block;';
    av.appendChild(img);
  } else {
    av.textContent = '→';
  }
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html.replace(/\n/g,'<br>');
  if(extra) bub.appendChild(extra);
  div.appendChild(av); div.appendChild(bub);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(){
  const div = document.createElement('div');
  div.className = 'typing-indicator'; div.id = 'typing';
  div.innerHTML = `<div class="avatar nova"><img src="Ramiya_avatar.jpg" alt="Ramiya" style="width:100%;height:100%;object-fit:cover;border-radius:8px;display:block;"></div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping(){ document.getElementById('typing')?.remove(); }

function showChips(options, onSelect){
  document.getElementById('chips-row')?.remove();
  const div = document.createElement('div');
  div.className = 'chips-row'; div.id = 'chips-row';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = opt.name || opt.label;
    btn.onclick = () => { document.getElementById('chips-row')?.remove(); onSelect(opt); };
    div.appendChild(btn);
  });
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function novaSay(msg, extra=null){
  showTyping();
  await delay(100);
  removeTyping();
  addMessage('nova', msg, extra);
}

// ── Weather ───────────────────────────────────────────────
async function fetchWeather(){
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.7589&longitude=-74.0033&current=temperature_2m,weather_code,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph');
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;
    let icon = '☀️', desc = 'Clear';
    if(code>=51&&code<=67){icon='🌧️';desc='Rainy';}
    else if(code>=71&&code<=77){icon='❄️';desc='Snowy';}
    else if(code>=80&&code<=82){icon='🌦️';desc='Showers';}
    else if(code>=2&&code<=3){icon='☁️';desc='Cloudy';}
    else if(code===1){icon='🌤️';desc='Mostly Clear';}
    state.weather = {temp, icon, desc, code};
    document.getElementById('weatherBadge').textContent = `${icon} ${temp}°F · ${desc}`;
    return state.weather;
  } catch(e) {
    document.getElementById('weatherBadge').textContent = '📍 Newark, NJ';
    return null;
  }
}

function getWeatherContext(){
  if(!state.weather) return '';
  const {desc, code} = state.weather;
  if(code>=71&&code<=77) return " It's snowing outside ❄️ — NJ Transit delays are likely today, so I'll keep a close eye on your trains.";
  if(code>=51&&code<=67) return " It's rainy out 🌧️ — wet weather can slow things down a bit.";
  if(code>=2&&code<=3) return " Cloudy day today.";
  return " Looks like decent weather today! ☀️";
}

// ── Claude Haiku AI ────────────────────────────────────────
const SYSTEM_PROMPT = `You are Ramiya, a witty and helpful NJ Transit AI assistant. You help commuters subscribe to train delay alerts via push notifications (ntfy app).

Your personality:
- Friendly, slightly sarcastic about NJ Transit delays (they're legendary)
- Keep responses SHORT — 1-3 sentences max
- Use occasional train/commute humor
- When trains are delayed, be empathetic but add light humor: "Classic NJ Transit 🚂💨"
- Reference weather when relevant

You guide users through these steps IN ORDER:
1. Welcome + ask what they want (subscribe, unsubscribe, check subscription)
2. If subscribing: ask LINE → STATION → MORNING TIME → [show trains] → EVENING TIME → [show trains] → PHONE → SUMMARY → CONFIRM (subscription is immediately active, no verification code needed)
3. If unsubscribing: ask PHONE → verify subscription exists → ask to confirm → unsubscribe (no code needed)

IMPORTANT RULES:
- Keep responses to 1-3 sentences
- When you need to show train selection UI, end your message with [SHOW_MORNING_TRAINS] or [SHOW_EVENING_TRAINS]
- When you have identified the line, include [LINE:CODE] (e.g. [LINE:NE])
- When you have identified the station, include [STATION:CODE] (e.g. [STATION:PJ])
- When you need morning time, include [NEED_MORNING_TIME]
- When you need evening time, include [NEED_EVENING_TIME]  
- When ready for phone number, include [NEED_PHONE]
- When ready to show summary and confirm, include [SHOW_SUMMARY]
- When user wants to unsubscribe, include [START_UNSUB]
- When user wants to check subscription, include [CHECK_SUB]
- Never make up train numbers — the UI handles train selection
- If user goes off-topic, gently redirect with humor: "I love a good tangent, but let's get your train alerts sorted first! 🚂"

Line codes: NE=Northeast Corridor, NC=North Jersey Coast, RV=Raritan Valley, ME=Morris & Essex, MC=Montclair-Boonton, ML=Main Line, BC=Bergen County, PV=Pascack Valley, AC=Atlantic City, GS=Gladstone Branch

Station codes for NE: TR=Trenton, HL=Hamilton, PJ=Princeton Junction, NB=New Brunswick, ED=Edison, MU=Metuchen, MP=Metropark, RH=Rahway, LI=Linden, EZ=Elizabeth, NP=Newark Penn

NTFY APP SETUP (answer questions about this confidently):
ntfy is a free, open-source push notification app. NJ Transit Alerts uses it to send you real-time train alerts. Your phone number is used as your account ID so you can manage or cancel later — no SMS messages are ever sent to it.

How to set up ntfy after subscribing:
1. Install the ntfy app — iPhone: search "ntfy" on App Store, Android: search "ntfy" on Play Store (by Philipp Heckel)
2. Open the ntfy app → tap the + button (top-right on iPhone, bottom-right on Android)
3. In the "Topic name" field, paste your personal topic (e.g. njtransit-abc123xyz). Leave the server as ntfy.sh (default)
4. Tap Subscribe — done! You'll now receive push notifications for your trains.

Shortcut: If on the same phone that subscribed, tap "Open in ntfy app →" button — it pre-fills the topic automatically, skipping steps 2 & 3.

Family sharing tip: Share your topic with family members — they can subscribe to the same topic on their phones and get the same alerts.

Troubleshooting:
- "I don't see the + button" → Make sure you're on the main screen of the ntfy app (not inside a topic)
- "It asks for a server" → Leave it as ntfy.sh (do not change it)
- "Where do I find my topic?" → Go back to the subscription confirmation page, or check your manage URL
- "I'm not getting notifications" → Check your phone's notification permissions for the ntfy app in Settings
- "Can I use it on multiple phones?" → Yes! Subscribe to the same topic on any number of devices`;

async function callNova(userMessage){
  history.push({role:'user', content: userMessage});
  try {
    const res = await fetch(`${API_BASE}/nova/chat`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: history
      })
    });
    const data = await res.json();
    console.log('Nova response:', JSON.stringify(data).slice(0,200));
    // Handle both direct Anthropic response and wrapped response
    let text = null;
    if(data.content && data.content[0] && data.content[0].text){
      text = data.content[0].text;
    } else if(data.detail){
      text = "Service error: " + data.detail;
    } else {
      console.error('Unexpected response format:', data);
      text = "I got confused there! Try again?";
    }
    history.push({role:'assistant', content: text});
    return text;
  } catch(e){
    console.error('callNova error:', e);
    return "Network hiccup! Try again? 🔄";
  }
}

function parseNovaResponse(text){
  let clean = text;
  const tags = {
    line: text.match(/\[LINE:([A-Z]{2})\]/),
    station: text.match(/\[STATION:([A-Z]{2,3})\]/),
    showMorning: text.includes('[SHOW_MORNING_TRAINS]'),
    showEvening: text.includes('[SHOW_EVENING_TRAINS]'),
    needMorningTime: text.includes('[NEED_MORNING_TIME]'),
    needEveningTime: text.includes('[NEED_EVENING_TIME]'),
    needPhone: text.includes('[NEED_PHONE]'),
    showSummary: text.includes('[SHOW_SUMMARY]'),
    startUnsub: text.includes('[START_UNSUB]'),
    checkSub: text.includes('[CHECK_SUB]'),
  };
  if(tags.line) state.line = tags.line[1], state.lineName = LINES.find(l=>l.code===tags.line[1])?.name;
  if(tags.station) state.station = tags.station[1], state.stationName = STATIONS[state.line]?.find(s=>s.code===tags.station[1])?.name;
  clean = clean.replace(/\[LINE:[A-Z]{2}\]|\[STATION:[A-Z]{2,3}\]|\[SHOW_MORNING_TRAINS\]|\[SHOW_EVENING_TRAINS\]|\[NEED_MORNING_TIME\]|\[NEED_EVENING_TIME\]|\[NEED_PHONE\]|\[SHOW_SUMMARY\]|\[START_UNSUB\]|\[CHECK_SUB\]/g,'').trim();
  return {clean, ...tags};
}

// ── Train helpers ──────────────────────────────────────────
function parseTrainMinutes(t){
  const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!m)return 0;
  let h=parseInt(m[1]),min=parseInt(m[2]);
  if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;
  if(m[3].toUpperCase()==='AM'&&h===12)h=0;
  return h*60+min;
}

async function loadAllTrains(){
  if(state.allTrainsData) return state.allTrainsData;
  const schedule = state.schedule || 'weekday';
  const res = await fetch(`${API_BASE}/trains/${state.station}?schedule=${schedule}`);
  const data = await res.json();
  state.allTrainsData = data;
  state.allInbound = data.inbound||[];
  return data;
}

function showTrainCards(trains, type){
  const wrapper = document.createElement('div');
  wrapper.className = 'train-cards';

  const dirLabel = document.createElement('div');
  dirLabel.style.cssText = 'font-size:0.7rem;color:var(--text-dim);margin-bottom:0.25rem;letter-spacing:0.05em;text-transform:uppercase;';
  dirLabel.textContent = type === 'morning' ? '↑ Toward New York Penn' : '↓ From New York Penn';
  wrapper.appendChild(dirLabel);

  const hintLabel = document.createElement('div');
  hintLabel.style.cssText = 'font-size:0.72rem;color:var(--text-dim);margin-bottom:0.5rem;opacity:0.8;';
  hintLabel.textContent = 'Tap to select up to 3 trains — #1 is your primary';
  wrapper.appendChild(hintLabel);

  const selectedTrains = [];

  // Continue button — shown after first selection
  const continueBtn = document.createElement('button');
  continueBtn.style.cssText = 'display:none;margin-top:0.6rem;padding:0.55rem 1rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:0.9rem;cursor:pointer;width:100%;font-weight:600;';
  continueBtn.textContent = 'Continue →';

  function updateBadges(){
    wrapper.querySelectorAll('.sel-badge').forEach(b=>b.remove());
    selectedTrains.forEach((t, i) => {
      wrapper.querySelectorAll('.train-card').forEach(c => {
        if(c.dataset.trainId === t.id){
          const badge = document.createElement('span');
          badge.className = 'sel-badge';
          badge.style.cssText = 'position:absolute;top:-7px;right:-7px;background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;line-height:1;z-index:1;';
          badge.textContent = i + 1;
          c.appendChild(badge);
        }
      });
    });
  }

  trains.forEach(train => {
    const card = document.createElement('div');
    card.className = 'train-card';
    card.dataset.trainId = train.id;
    card.style.position = 'relative';
    const dest = type === 'morning' ? (train.destination || 'New York Penn') : `to ${state.stationName || train.destination}`;
    card.innerHTML = `<span class="train-num">#${train.id}</span><span class="train-time">${train.time}</span><span class="train-dest">${dest}</span>`;
    card.onclick = () => {
      const idx = selectedTrains.findIndex(t => t.id === train.id);
      if(idx !== -1){
        selectedTrains.splice(idx, 1);
        card.classList.remove('selected');
      } else {
        if(selectedTrains.length >= 3) return;
        selectedTrains.push(train);
        card.classList.add('selected');
      }
      updateBadges();
      continueBtn.style.display = selectedTrains.length > 0 ? '' : 'none';
      continueBtn.textContent = selectedTrains.length === 1
        ? 'Continue with 1 train →'
        : `Continue with ${selectedTrains.length} trains →`;
    };
    wrapper.appendChild(card);
  });

  wrapper.appendChild(continueBtn);
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;

  continueBtn.onclick = async () => {
    if(selectedTrains.length === 0) return;
    wrapper.querySelectorAll('.train-card').forEach(c => { c.classList.add('disabled'); c.onclick = null; });
    continueBtn.disabled = true;
    continueBtn.style.opacity = '0.6';

    const trainSummary = selectedTrains.map((t, i) =>
      i === 0 ? `Train ${t.id} at ${t.time}` : `+ backup Train ${t.id} at ${t.time}`
    ).join(', ');
    addMessage('user', trainSummary);

    if(type === 'morning'){
      state.morningTrains = [...selectedTrains];
      state.morningTrain = selectedTrains[0];
      history.push({role:'user', content:`I selected ${trainSummary} as my morning train(s).`});
      const resp = await callNova(`I selected ${trainSummary} as my morning train(s). Now ask me what time I leave work in the evening.`);
      await novaSay(parseNovaResponse(resp).clean);
      state.step = 'evening_time';
      document.getElementById('userInput').placeholder = 'e.g. 5:30 PM or 6 PM';
    } else {
      state.eveningTrains = [...selectedTrains];
      state.eveningTrain = selectedTrains[0];
      history.push({role:'user', content:`I selected ${trainSummary} as my evening train(s).`});
      const resp = await callNova(`I selected ${trainSummary} as my evening train(s). Now ask for their phone number — it's used to identify their subscription and makes it easy to manage or unsubscribe later. Keep it brief.`);
      await novaSay(parseNovaResponse(resp).clean);
      state.step = 'phone';
      document.getElementById('userInput').placeholder = 'Your 10-digit phone number';
    }
  };
}

// ── Step handlers ──────────────────────────────────────────
async function handleMorningTime(text){
  const m=text.match(/(\d+)/);
  const hour=m?parseInt(m[1]):7;
  const isPM=text.toLowerCase().includes('pm');
  const hour24=isPM&&hour!==12?hour+12:hour;
  showTyping();
  try{
    const data = await loadAllTrains();
    removeTyping();
    const targetMins=hour24*60;
    const filtered=(data.outbound||[]).filter(t=>{
      const mins=parseTrainMinutes(t.time);
      return mins>=(targetMins-30)&&mins<=(targetMins+90);
    }).slice(0,6);

    if(filtered.length>0){
      const resp = await callNova(`User wants morning trains around ${text} from ${state.stationName}. Found options. Show them.`);
      await novaSay(parseNovaResponse(resp).clean);
      showTrainCards(filtered,'morning');
    } else {
      const allSorted=[...(data.outbound||[])].sort((a,b)=>parseTrainMinutes(a.time)-parseTrainMinutes(b.time));
      const afterTime=allSorted.filter(t=>parseTrainMinutes(t.time)>=targetMins).slice(0,3);
      const beforeTime=allSorted.filter(t=>parseTrainMinutes(t.time)<targetMins).slice(-2);
      const nearest=[...beforeTime,...afterTime].slice(0,6);
      const earliestAfter=afterTime[0];
      const latestBefore=beforeTime[beforeTime.length-1];
      let msg='';
      if(earliestAfter&&latestBefore) msg=`No trains found around ${text}. Nearest options are ${latestBefore.time} and ${earliestAfter.time}:`;
      else if(earliestAfter) msg=`No trains around ${text} — next available is ${earliestAfter.time}:`;
      else msg=`No trains found around ${text}. Here are the available options:`;
      await novaSay(msg);
      showTrainCards(nearest.length>0?nearest:allSorted.slice(0,6),'morning');
    }
    state.step='morning_train';
  }catch(e){
    removeTyping();
    await novaSay("Couldn't load trains right now. The NJ Transit API is probably taking a nap 😴 Try again?");
    state.step='morning_time';
  }
}

async function handleEveningTime(text){
  const m=text.match(/(\d+)/);
  const hour=m?parseInt(m[1]):17;
  const hasAM=text.toLowerCase().includes('am');
  const hasPM=text.toLowerCase().includes('pm');
  const isPM=hasPM||((!hasAM)&&hour>=1&&hour<=9);
  const hour24=isPM&&hour!==12?hour+12:hour;
  const targetMins=hour24*60;

  // Try tight window first (±30min to +2.5hr)
  const filtered=state.allInbound.filter(t=>{
    const mins=parseTrainMinutes(t.time);
    return mins>=(targetMins-30)&&mins<=(targetMins+150);
  }).slice(0,6);

  if(filtered.length>0){
    // Found trains near requested time
    const resp = await callNova(`User wants evening trains around ${text}. Found some options near that time. Show them.`);
    await novaSay(parseNovaResponse(resp).clean);
    showTrainCards(filtered,'evening');
  } else {
    // No trains near that time — find nearest available trains and explain
    const allSorted = [...state.allInbound].sort((a,b)=>parseTrainMinutes(a.time)-parseTrainMinutes(b.time));
    const afterTime = allSorted.filter(t=>parseTrainMinutes(t.time)>=targetMins).slice(0,3);
    const beforeTime = allSorted.filter(t=>parseTrainMinutes(t.time)<targetMins).slice(-2);
    const nearest = [...beforeTime, ...afterTime].slice(0,6);

    if(nearest.length>0){
      const earliestAfter = afterTime[0];
      const latestBefore = beforeTime[beforeTime.length-1];
      let noTrainMsg = '';
      if(earliestAfter && latestBefore){
        noTrainMsg = `No trains found around ${text}. The nearest options are around ${latestBefore.time} (before) and ${earliestAfter.time} (after). Here's what's available:`;
      } else if(earliestAfter){
        noTrainMsg = `No trains around ${text} — the next available train is at ${earliestAfter.time}. Here are your options:`;
      } else if(latestBefore){
        noTrainMsg = `No trains after ${text} — the last available train was at ${latestBefore.time}. Here are the latest options:`;
      } else {
        noTrainMsg = `Couldn't find trains around ${text}. Here are all available options:`;
      }
      await novaSay(noTrainMsg);
      showTrainCards(nearest,'evening');
    } else {
      // No inbound trains at all — fall back to all
      await novaSay(`No trains found around ${text}. Showing all available options from ${state.stationName}:`);
      showTrainCards(allSorted.slice(0,6),'evening');
    }
  }
  state.step='evening_train';
}

async function handlePhone(text){
  const digits=text.replace(/\D/g,'');
  if(digits.length!==10){
    showTyping();
    const r = await callNova(`The user is at the phone number step. I need their 10-digit US mobile number to send train delay alerts. They typed: "${text}". If it's a question about the app or trains, answer briefly then ask for their number again. If it's off-topic, be playfully witty and steer them back to entering their number. If it looks like a partial or wrongly formatted number, gently explain the format (e.g. 973-555-1234 or 9735551234). Keep it natural and concise.`);
    removeTyping();
    await novaSay(parseNovaResponse(r).clean);
    return;
  }
  state.phone=text;
  // Show proper consent card UI
  await novaSay("Almost there! Just need your consent before we activate alerts:");
  showConsentCard();
  state.step='consent';
}

async function continueAfterConsent(){
  // Show summary
  const summary=document.createElement('div');
  summary.className='summary-card';
  summary.innerHTML=`
    <div class="summary-header">✦ YOUR ALERT SETUP</div>
    <div class="summary-row"><span class="summary-label">LINE</span><span class="summary-value">${state.lineName}</span></div>
    <div class="summary-row"><span class="summary-label">STATION</span><span class="summary-value">${state.stationName}</span></div>
    <div class="summary-row"><span class="summary-label">SCHEDULE</span><span class="summary-value">${state.schedule==='saturday'?'🏖️ Saturday':state.schedule==='sunday'?'🌅 Sunday & Holidays':'📅 Weekday'}</span></div>
    <div class="summary-row"><span class="summary-label">MORNING</span><span class="summary-value">${(state.morningTrains.length?state.morningTrains:[state.morningTrain]).filter(Boolean).map((t,i)=>i===0?`Train ${t.id} · ${t.time}`:`+${t.id} · ${t.time}`).join(' ')}</span></div>
    <div class="summary-row"><span class="summary-label">EVENING</span><span class="summary-value">${(state.eveningTrains.length?state.eveningTrains:[state.eveningTrain]).filter(Boolean).map((t,i)=>i===0?`Train ${t.id} · ${t.time}`:`+${t.id} · ${t.time}`).join(' ')}</span></div>
    ${state.phone ? `<div class="summary-row"><span class="summary-label">PHONE</span><span class="summary-value">${state.phone}</span></div>` : `<div class="summary-row"><span class="summary-label">ALERTS</span><span class="summary-value">🔔 Push notifications (ntfy)</span></div>`}`;
  const resp = await callNova("Show the user a summary and ask them to confirm their subscription.");
  const parsed = parseNovaResponse(resp);
  await novaSay(parsed.clean, summary);
  state.step='confirm';
  await delay(300);
  showChips([
    {name:'✓ Confirm & Subscribe', code:'yes'},
    {name:'✕ Start Over', code:'no'}
  ], async opt => {
    addMessage('user', opt.name);
    if(opt.code==='yes') await doSubscribe();
    else {
      resetState();
      const resp = await callNova("User wants to start over. Welcome them back and ask what they want to do.");
      await novaSay(parseNovaResponse(resp).clean);
      showChips([
        {name:'Subscribe to alerts', code:'sub'},
        {name:'Unsubscribe', code:'unsub'},
        {name:'Check my subscription', code:'check'}
      ], handleMainMenu);
    }
  });
}

async function doSubscribe(){
  showTyping();
  try{
    const body = {
      morning_trains: (state.morningTrains || []).map(t => t.id),
      evening_trains: (state.eveningTrains || []).map(t => t.id),
      delay_alerts: true,
      ontime_alerts: true,
      station: state.station || ''
    };
    if (!state.phone) { removeTyping(); await novaSay("I need your phone number first! What is it?"); state.step='phone'; return; }
    body.phone = '+1' + state.phone.replace(/\D/g, '');
    const res=await fetch(`${API_BASE}/subscribe`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    removeTyping();
    if(res.ok){
      const data = await res.json();
      if(data.requires_verification){
        state.pendingSubscribeBody = body;
        state.step = 'change_verify';
        document.getElementById('userInput').placeholder = '6-digit code';
        await novaSay("🔐 Looks like you already have an active subscription! I just sent a 6-digit code to your ntfy app to confirm the change. What's the code?");
        return;
      }
      state.ntfy_topic = data.ntfy_topic || '';
      // Always active — no verification step
      await showNtfySuccess(data.returning || false, data.reactivated || false);
    } else {
      const d=await res.json();
      await novaSay(`Hmm, something went sideways: ${d.detail}. Want to try again?`);
    }
  }catch(e){ removeTyping(); await novaSay("Network trouble! Try again in a sec 🔄"); }
}

async function handleChangeVerify(text){

    await novaSay(parseNovaResponse(r).clean);
    return;
  }
  showTyping();
  try{
    const body = { ...(state.pendingSubscribeBody || {}), code };
    const res = await fetch(`${API_BASE}/subscribe/verify-change`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});

}

// Detect back/restart intent
function isGoingBack(text){
  const t = text.toLowerCase();
  return t.match(/\b(back|previous|go back|undo|change|wrong|mistake|start over|restart|reset|cancel|different|change my mind)\b/);
}

function getStepBack(step){
  const backMap = {
    'station': 'line',
    'schedule': 'station',
    'morning_time': 'schedule',
    'morning_train': 'morning_time',
    'evening_time': 'morning_train',
    'evening_train': 'evening_time',
    'phone': 'evening_train',
    'consent': 'phone',
    'confirm': 'phone',
    'unsub_code': 'unsub_phone',
    'change_verify': 'confirm',
  };
  return backMap[step] || 'welcome';
}

  const prevStep = getStepBack(state.step);

    case 'welcome':
    default:
      resetState();
      await novaSay("No problem, let's start fresh! What would you like to do?");
      state.step='welcome';
      showChips([{name:'Subscribe to alerts',code:'sub'},{name:'Unsubscribe',code:'unsub'},{name:'Check my subscription',code:'check'}], handleMainMenu);
  }
}

async function sendMessage(){
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text || state.step==='loading') return;
  input.value = '';
  addMessage('user', text);

  // Check for back/restart intent first — works from any step
  const backSteps = ['line','station','schedule','morning_time','morning_train','evening_time','evening_train','phone','consent','confirm','unsub_phone','unsub_code','change_verify'];
  if(isGoingBack(text) && backSteps.includes(state.step)){
    await goBack();
    return;
  }

  // Steps that need card taps — but still let Nova answer questions/off-topic gracefully
  if(state.step==='morning_train'){
    // If they typed a time, re-filter the cards immediately
    if(/\d/.test(text)){ await handleMorningTime(text); return; }
    showTyping();
    const r = await callNova(`The user is choosing their morning train from ${state.stationName}. Train cards are shown above — they need to TAP one to select it. They typed: "${text}". If they're asking a question about trains or commuting, answer it briefly then redirect them to tap a card. If it's totally off-topic, be witty and playfully redirect them back. Keep it short.`);
    removeTyping();
    await novaSay(parseNovaResponse(r).clean);
    return;
  }
  if(state.step==='evening_train'){
    // If they typed a time, re-filter the cards
    if(/\d/.test(text)){ await handleEveningTime(text); return; }
    showTyping();
    const r = await callNova(`The user is choosing their evening train back from NYC to ${state.stationName}. Train cards are shown above — they need to TAP one to select it. They typed: "${text}". If they're asking a question about trains or commuting, answer it briefly then redirect them to tap a card. If it's totally off-topic, be witty and playfully redirect them back. If they mention a time (like "6pm"), let them know they can type a time to re-filter the cards. Keep it short.`);
    removeTyping();
    await novaSay(parseNovaResponse(r).clean);
    return;
  }
  if(state.step==='confirm' || state.step==='unsub_confirm' || state.step==='schedule'){
    const stepDesc = state.step==='schedule' ? 'picking a schedule type (weekday/saturday/sunday)' : state.step==='confirm' ? 'confirming their subscription details' : 'confirming they want to unsubscribe';
    showTyping();
    const r = await callNova(`The user is at the step of ${stepDesc} and should tap one of the buttons shown above. They typed: "${text}". If it's a question, answer it briefly then redirect to the buttons. If it's off-topic, be witty and redirect. Keep it very short.`);
    removeTyping();
    await novaSay(parseNovaResponse(r).clean);
    return;
  }

  switch(state.step){
    case 'welcome':
    case 'post': {
      showTyping();
      const resp = await callNova(text);
      removeTyping();
      const parsed = parseNovaResponse(resp);
      await delay(100);
      addMessage('nova', parsed.clean);
      if(parsed.startUnsub){ state.step='unsub_phone'; document.getElementById('userInput').placeholder='Your phone number'; }
      else if(parsed.checkSub){ state.step='check_phone'; document.getElementById('userInput').placeholder='Your phone number'; }
      else if(state.step==='welcome'){
        await delay(300);
        showChips([{name:'Subscribe to alerts',code:'sub'},{name:'Unsubscribe',code:'unsub'},{name:'Check my subscription',code:'check'}], handleMainMenu);
      }
      break;
    }
    case 'line': {
      const match = LINES.find(l=>text.toLowerCase().includes(l.name.toLowerCase().split(' ')[0]));
      if(match) await selectLine(match);
      else { showTyping(); const r=await callNova(text); removeTyping(); addMessage('nova',parseNovaResponse(r).clean); showChips(LINES,selectLine); }
      break;
    }
    case 'station': {
      const stations=STATIONS[state.line]||[];
      const match=stations.find(s=>text.toLowerCase().includes(s.name.toLowerCase().split(' ')[0]));
      if(match) await selectStation(match);
      else { showTyping(); const r=await callNova(text); removeTyping(); addMessage('nova',parseNovaResponse(r).clean); showChips(stations,selectStation); }
      break;
    }
    case 'morning_time': await handleMorningTime(text); break;
    case 'evening_time': await handleEveningTime(text); break;
    case 'phone': await handlePhone(text); break;
    case 'unsub_phone': await handleUnsubPhone(text); break;
    case 'unsub_code': await handleUnsubCode(text); break;
    case 'check_phone': await handleCheckSub(text); break;
    case 'change_verify': await handleChangeVerify(text); break;
    default: {
      showTyping();
      const resp = await callNova(text);
      removeTyping();
      addMessage('nova', parseNovaResponse(resp).clean);
    }
  }
}

// ── Init ───────────────────────────────────────────────────
(async()=>{
  const weather = await fetchWeather();
  state.timeOfDay = getTimeOfDay();
  const greetings = {morning:'Good morning', afternoon:'Good afternoon', evening:'Good evening', night:'Hey night owl'};
  const greeting = greetings[state.timeOfDay];
  const weatherLine = weather ? getWeatherContext() : '';
  
  const initMsg = `${greeting}! I'm Ramiya, your NJ Transit AI assistant.${weatherLine}\n\nI can help you set up delay alerts, manage your subscription, or answer commute questions. What do you need?`;
  
  // Add to history so Nova remembers the greeting
  history.push({role:'assistant', content:initMsg});
  
  await delay(400);
  addMessage('nova', initMsg);
  state.step = 'welcome';
  await delay(300);
  showChips([
    {name:'🔔 Subscribe to alerts', code:'sub'},
    {name:'🔕 Unsubscribe', code:'unsub'},
    {name:'📋 Check my subscription', code:'check'}
  ], handleMainMenu);

  // Auto-focus input after greeting loads (desktop only — avoids keyboard popup on mobile)
  if (window.innerWidth > 640) {
    document.getElementById('userInput').focus();
  }
})();
</script>
